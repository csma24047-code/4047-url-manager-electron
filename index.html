<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body
    class="bg-gray-50 text-slate-900 min-h-screen p-4 md:p-12 flex flex-col items-center"
  >
    <div class="max-w-4xl w-full">
      <!-- ヘッダーセクション -->
      <header class="flex justify-between items-end mb-8">
        <div>
          <h1 class="text-3xl font-extrabold tracking-tight text-slate-800">
            Tag Manager
          </h1>
          <p class="text-slate-500 mt-1">
            URLリストをタグ形式で整理・管理します
          </p>
        </div>
        <div class="text-right">
          <span
            id="tagCount"
            class="text-xs font-bold uppercase tracking-wider bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full"
          >
            0 Tags
          </span>
        </div>
      </header>

      <!-- 操作パネル -->
      <div
        class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-8"
      >
        <div class="flex flex-col md:flex-row gap-4">
          <button
            id="loadBtn"
            class="whitespace-nowrap bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 px-6 rounded-lg transition-all flex items-center justify-center gap-2 active:scale-95 cursor-pointer"
          >
            <i class="fa-solid fa-file-import"></i>
            ファイルを読み込む
          </button>

          <div class="relative grow">
            <input
              type="text"
              placeholder="クイック検索・追加..."
              class="w-full bg-slate-100 border-none rounded-lg py-2.5 pl-10 pr-4 focus:ring-2 focus:ring-indigo-500 transition-all"
            />
            <i
              class="fa-solid fa-magnifying-glass absolute left-3 top-3.5 text-slate-400"
            ></i>
          </div>
        </div>
      </div>

      <!-- メインコンテンツ：タグリスト -->
      <div id="urlList" class="flex flex-wrap gap-3">
        <!-- サンプルのタグ（renderer.jsで生成される構造のイメージ） -->
        <div
          class="group flex items-center bg-white border border-slate-200 hover:border-indigo-300 hover:shadow-sm transition-all rounded-lg px-4 py-2 cursor-pointer"
        >
          <span class="text-sm font-medium text-slate-700 mr-3"
            >https://example.com</span
          >
          <button class="text-slate-400 hover:text-red-500 transition-colors">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>
      </div>

      <!-- 空の状態のプレースホルダー（必要に応じて表示） -->
      <div
        id="emptyState"
        class="hidden flex-col items-center justify-center py-20 text-slate-400"
      >
        <i class="fa-solid fa-tags text-5xl mb-4 opacity-20"></i>
        <p>表示するタグがありません</p>
      </div>
    </div>

    <script src="renderer.js"></script>
  </body>
</html>
